services:
    backend:
        build:
            context: ./backend
            dockerfile: Dockerfile
        container_name: effective_backend
        expose:
            - '8080'
        networks:
            - app_network
        restart: always
    nginx:
        image: nginx:latest
        container_name: effective_nginx
        ports:
            - '80:80'
        volumes:
            - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
        depends_on:
            - backend
        networks:
            - app_network
        restart: always
networks:
    app_network:
        driver: bridge